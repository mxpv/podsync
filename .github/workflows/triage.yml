name: Issue Triage
run-name: "Triage #${{ github.event.issue.number || inputs.issue_number }}"
on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to triage"
        required: true
        type: number

jobs:
  triage-issue:
    name: Triage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Triage issue with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          show_full_output: true
          prompt: |
            You're an issue triage assistant for GitHub issues. Your task is to analyze the issue, apply appropriate labels, and help users with trivial questions.

            Issue Information:
            - REPO: ${{ github.repository }}
            - ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}

            TASK OVERVIEW:

            1. First, fetch the list of labels available in this repository by running: `gh label list`.

            2. Use gh CLI to interact with the issue:
               - gh issue view: Get issue details
               - gh issue edit: Apply labels or close the issue
               - gh search issues: Find similar issues for context
               - gh issue list: Understand labeling patterns
               - gh issue comment: Post a helpful response when needed

            3. Analyze the issue content, considering:
               - The issue title and description
               - The type of issue (bug report, feature request, question, etc.)
               - Technical areas mentioned
               - Severity or priority indicators

            4. Check if this is a QUESTION that can be answered from documentation or configuration:
               - Read the README.md and docs/ folder for relevant information
               - IMPORTANT: Read config.toml.example for all available configuration options
               - Common topics: configuration, cron schedules, API keys, Docker setup, NAS setup, database settings, cleanup policies
               - Documentation files: README.md, config.toml.example, docs/cron.md, docs/how_to_get_youtube_api_key.md, docs/how_to_get_vimeo_token.md

               If the question CAN BE SOLVED with an EXISTING configuration option:
               - Post a helpful comment using `gh issue comment` explaining the relevant config option(s)
               - Include a TOML code example showing EXACTLY how to configure it
               - Reference the config.toml.example file
               - Apply a "question" label if available
               - Do NOT close the issue - leave it open for the maintainer to close after user confirmation

               Example response format for config questions:
               ```
               This can be configured using the `[cleanup]` section in your config.toml:

               ```toml
               [cleanup]
               keep_last = 50  # Keep only the last 50 episodes
               ```

               You can also configure cleanup per-feed:
               ```toml
               [feeds.myfeed]
               clean = { keep_last = 10 }
               ```

               See config.toml.example for more options. Feel free to close this issue if that resolves your question!
               ```

               If the question CANNOT be solved with existing configuration:
               - Apply a "question" label and optionally an "enhancement" label
               - Post a brief comment acknowledging the question and noting that this feature/option doesn't currently exist
               - Leave the issue open for maintainer review

            5. For NON-TRIVIAL issues (bugs, feature requests, etc.):
               - Apply appropriate labels from the available list
               - Do NOT post comments for these
               - Select priority labels if you can determine urgency

            6. Check for DUPLICATE issues:
               - Search for similar existing issues using `gh search issues`:
                 - Run MULTIPLE searches with different keyword combinations
                 - Try synonyms and related terms (e.g., "indexing" -> "crawl", "scrape", "robots")
                 - Search for core concepts, not just exact phrases
                 - Include both open and closed issues
               - Criteria for duplicates:
                 - Same bug or error being reported
                 - Same feature request (even if worded differently)
                 - Same question being asked
                 - Issues describing the same root problem
               - If this is a clear duplicate of an existing issue:
                 - Post a comment linking to the original issue(s)
                 - Apply a "duplicate" label
                 - Close the issue using `gh issue close --reason duplicate`
                 - Be polite and suggest the user follow the original issue
               - This is the ONLY case where you should close an issue

            IMPORTANT GUIDELINES:
            - Be helpful and friendly in any comments you post
            - NEVER close issues except for duplicates - leave them open for maintainer review
            - For bugs and feature requests, only apply labels without commenting

          claude_args: |
            --allowedTools "Bash,Read,Glob,Grep"
